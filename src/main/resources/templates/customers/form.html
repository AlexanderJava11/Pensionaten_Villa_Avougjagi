<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gäst | Villa Avougjagi</title>
    <link rel="stylesheet" th:href="@{/css/hotel.css}">
</head>

<body class="hotel-body">

<header class="hotel-topbar">
    <nav class="hotel-nav">
        <a class="brand" th:href="@{/}">Villa Avougjagi</a>

        <div class="nav-links">
            <a class="active" th:href="@{/customers}">Gäster</a>
            <a th:href="@{/rooms}">Rum</a>
            <a th:href="@{/bookings}">Bokningar</a>
            <a th:href="@{/bookings/new}">Boka vistelse</a>
            <!-- <a th:href="@{/about}">Om oss</a> -->        </div>
    </nav>
</header>

<main class="container-lux">

    <section class="page-head">
        <div>
            <div class="kicker">Gästprofil</div>

            <h1 class="page-title"
                th:text="${customer.id == null ? 'Ny gäst' : 'Ändra gäst'}">
                Ny gäst
            </h1>

            <p class="lead">
                Fyll i gästens kontaktuppgifter. Dessa uppgifter används sedan vid bokning av rum.
            </p>
        </div>
    </section>

    <section class="card-lux form-card">
        <form th:action="@{/customers/save}" th:object="${customer}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="form-grid">

                <div class="field">
                    <label for="firstName">Förnamn</label>
                    <input id="firstName"
                           type="text"
                           th:field="*{firstName}"
                           placeholder="Ex. Alexander">

                    <div class="error-text"
                         th:if="${#fields.hasErrors('firstName')}"
                         th:errors="*{firstName}">
                    </div>
                </div>

                <div class="field">
                    <label for="lastName">Efternamn</label>
                    <input id="lastName"
                           type="text"
                           th:field="*{lastName}"
                           placeholder="Ex. Zeljic">

                    <div class="error-text"
                         th:if="${#fields.hasErrors('lastName')}"
                         th:errors="*{lastName}">
                    </div>
                </div>

                <div class="field">
                    <label for="email">E-post</label>
                    <input id="email"
                           type="email"
                           th:field="*{email}"
                           placeholder="namn@mail.se">

                    <div class="error-text"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <div class="field">
                    <label for="phone">Telefon</label>
                    <input id="phone"
                           type="text"
                           th:field="*{phone}"
                           placeholder="0701234567">

                    <div class="error-text"
                         th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}">
                    </div>
                </div>

            </div>

            <div class="actions form-actions">
                <button class="btn-luxury" type="submit">
                    Spara gäst
                </button>

                <a class="btn-outline-luxury" th:href="@{/customers}">
                    Tillbaka
                </a>
            </div>

        </form>
    </section>

</main>

</body>
</html>
