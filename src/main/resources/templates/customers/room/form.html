<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Rum | Villa Avougjagi</title><link rel="stylesheet" th:href="@{/css/hotel.css}"></head>
<body class="hotel-body">
<header class="hotel-topbar"><nav class="hotel-nav"><a class="brand" th:href="@{/}">Villa Avougjagi</a><div class="nav-links"><a th:href="@{/customers}">Gäster</a><a class="active" th:href="@{/rooms}">Rum</a><a th:href="@{/bookings}">Bokningar</a></div></nav></header>
<main class="container-lux"><div class="page-head"><div><div class="kicker">Rum</div><h1 class="page-title" th:text="${room.id == null ? 'Nytt rum' : 'Ändra rum'}">Nytt rum</h1><p class="lead">Tips: extrasängar används bara för dubbelrum enligt VG-kravet.</p></div></div>
<section class="card-lux"><form th:action="@{/rooms/save}" th:object="${room}" method="post"><input type="hidden" th:field="*{id}"><div class="form-grid"><div class="field"><label>Rumsnummer</label><input th:field="*{roomNumber}" placeholder="201"><div class="error-text" th:errors="*{roomNumber}"></div></div><div class="field"><label>Rumstyp</label><select th:field="*{roomType}"><option value="">Välj rumstyp</option><option th:each="type : ${roomTypes}" th:value="${type.name()}" th:text="${type.displayName}"></option></select><div class="error-text" th:errors="*{roomType}"></div></div><div class="field"><label>Extrasängar</label><input type="number" min="0" max="2" th:field="*{extraBeds}"><div class="error-text" th:errors="*{extraBeds}"></div></div><div class="field"><label>Pris per natt</label><input type="number" min="0" th:field="*{pricePerNight}" placeholder="1495"><div class="error-text" th:errors="*{pricePerNight}"></div></div></div><div class="actions" style="margin-top:22px"><button class="btn-luxury" type="submit">Spara rum</button><a class="btn-outline-luxury" th:href="@{/rooms}">Tillbaka</a></div></form></section>
</main></body></html>
